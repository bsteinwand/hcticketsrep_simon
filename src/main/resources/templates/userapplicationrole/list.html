<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/main}">
<head>
    <title>User Application Roles</title>
</head>

<body>
<div layout:fragment="content">

    <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
        <h2 style="margin-top: 0;">Current User Roles</h2>

        <table>
            <thead>
            <tr>
                <th>User</th>
                <th>Application</th>
                <th>Role</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="assignmentRows" th:fragment="rows">
            <tr th:each="a : ${assignments}">
                <td th:text="${a.userName}"></td>
                <td th:text="${a.appName}"></td>
                <td th:text="${a.appRoleName}"></td>
                <td th:text="${a.status}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    
    <div th:if="${errorMessage}" style="color: red; margin-bottom: 15px;">
	    <span th:text="${errorMessage}"></span>
	</div>
	
	<div th:if="${successMessage}" style="color: green;">
	    <p th:text="${successMessage}"></p>
	</div>

    <button hx-get="/applicationrole/new"
            hx-target="#formContainer"
            hx-swap="innerHTML">
        Assign New Role to User
    </button>

    <div id="formContainer" style="margin-top: 20px;"></div>
    
    <h3>Unassign User from Role</h3>

	<div>
	    <label for="unassignUserSelect">Select User:</label>
	    <select id="unassignUserSelect"
	            name="userId"
	            onchange="htmx.ajax('GET', '/applicationrole/unassign/' + this.value, {target:'#unassignContainer', swap:'innerHTML'})">
	        <option value="" disabled selected>Select a user</option>
	        <option th:each="user : ${users}"
	                th:value="${user.id}"
	                th:text="${user.firstName} + ' ' + ${user.lastName}">
	        </option>
	    </select>
	</div>
	
	<br>
	
	<div id="unassignContainer"></div>

</div>
</body>
</html>
